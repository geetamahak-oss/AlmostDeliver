{% extends 'shop/base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; text-align: center; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #131921;">Track Your Order 🚚</h2>
    <form method="GET">
        <input type="text" name="order_id" placeholder="Enter Order ID (e.g. 101)" style="width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">
        <br>
        <button type="submit" style="background: #febd69; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">Check Status</button>
    </form>

    {% if status %}
        <div style="margin-top: 30px; padding: 20px; border-top: 2px solid #eee;">
            {% if status == "Invalid ID" %}
                <p style="color: red;">❌ Order ID not found. Please check again.</p>
            {% else %}
                <p style="font-size: 18px;">Order ID: <strong>#{{ order_id }}</strong></p>
                <div style="font-size: 24px; font-weight: bold; color: #2ecc71;">
                    Status: {{ status }}
                </div>
                <p style="color: #666; font-size: 14px; margin-top: 10px;">
                    (Updated by AlmostDeliver Team)
                </p>
            {% endif %}
        </div>
    {% endif %}
</div>
{% endblock %}
