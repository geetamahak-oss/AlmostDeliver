<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmostDeliver | Lucknow Special</title>
    
    <style>
        /* --- बेसिक स्टाइलिंग --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f3f3;
            transition: 0.3s;
        }

        /* --- डार्क मोड के नियम --- */
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #131921;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #febd69;
        }

        /* --- प्रोडक्ट कार्ड्स --- */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: white;
            width: 280px;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .dark-mode .card {
            background-color: #1e1e1e;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price-tag {
            font-size: 22px;
            font-weight: bold;
            color: #B12704;
        }

        .dark-mode .price-tag {
            color: #ff9900;
        }

        .buy-btn {
            background: #ffd814;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .category-bar {
            background: #37475a;
            padding: 10px;
            text-align: center;
        }

        .category-bar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
            border: 1px solid #febd69;
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="logo">AlmostDeliver</div>
            <button onclick="toggleDarkMode()" id="modeBtn" style="background: #232f3e; border: 1px solid #febd69; color: #febd69; cursor: pointer; padding: 5px 12px; border-radius: 20px; font-weight: bold;">
                🌙 Dark
            </button>
        </div>

        <form action="/" method="GET">
            <input type="text" name="search" placeholder="Search products..." style="padding: 8px; border-radius: 5px; border: none;">
            <button type="submit" style="background: #febd69; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Search</button>
        </form>
    </div>

    <div class="category-bar">
        <a href="/">All</a>
        <a href="/?cat=Fashion">Fashion</a>
        <a href="/?cat=Food">Food</a>
    </div>

    <div class="container">
        {% for p in products %}
        <div class="card">
            <img src="{{ p.image_url }}" alt="{{ p.name }}">
            <h3>{{ p.name }}</h3>
            <p>{{ p.description|truncatewords:10 }}</p>
            
            <span class="price-tag">₹{{ p.price }}</span>
            
            <div style="font-size: 13px; color: #007600; font-weight: bold; margin-top: 5px;">
                🚚 FREE Delivery: <span style="color: inherit;">By Tomorrow</span>
            </div>

            <a href="{% url 'add_to_cart' p.id %}">
                <button class="buy-btn">Buy Now</button>
            </a>
        </div>
        {% empty %}
        <h2>No Products Found :(</h2>
        {% endfor %}
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            var btn = document.getElementById("modeBtn");
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = "☀️ Light";
                btn.style.color = "#131921";
                btn.style.background = "#febd69";
            } else {
                btn.innerHTML = "🌙 Dark";
                btn.style.color = "#febd69";
                btn.style.background = "#232f3e";
            }
        }
    </script>

</body>
</html>
