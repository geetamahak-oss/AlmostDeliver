<div style="max-width: 400px; margin: 50px auto; font-family: Arial; padding: 20px; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #232f3e;">Order Details</h2>
    <p>आप खरीद रहे हैं: <strong>{{ product.name }}</strong></p>
    <p>कीमत: <strong>₹{{ product.price }}</strong></p>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>आपका नाम:</label><br>
            <input type="text" name="customer_name" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>पूरा पता (Lucknow):</label><br>
            <textarea name="address" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
        </div>
        <div style="margin-bottom: 15px;">
            <label>मोबाइल नंबर:</label><br>
            <input type="text" name="phone" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <button type="submit" style="background: #FFD814; border: 1px solid #FCD200; padding: 12px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;">
            ऑर्डर कन्फर्म करें
        </button>
    </form>
</div>
